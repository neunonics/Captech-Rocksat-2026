[env:blackpill_f401ce]
platform = ststm32
board = blackpill_f401ce
framework = arduino

upload_protocol = stlink

lib_deps = rock7/RockBLOCK-9704@^0.1.29

lib_ldf_mode = deep+
build_flags = 
    -DIMT_PAYLOAD_SIZE=512U
